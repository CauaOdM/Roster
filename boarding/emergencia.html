<!DOCTYPE html>

<body class="emergencia-page">

    <header class="header">

        </a>

        <h1 class="header__title">Roster</h1>

        <nav class="header-icons">
            <a href="../perfil.html" class="header-icons__link">

            <span class="emergencia-alert__icon">!</span>

        <div class="emergencia-acoes">

            <a href="boarding.html" class="slider-cancelar">
                <span class="slider-cancelar__trilho">
                    <span class="slider-cancelar__bolha"></span>
                </span>
                <p class="emergencia-acoes__texto">Deslize para cancelar a solicitação</p>

    <footer class="footer">
        <p>Copyright © 2026 Roster. Todos os direitos reservados.</p>
