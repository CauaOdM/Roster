<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitação de Ausência</title>

    <link rel="stylesheet" href="../CSS/reset.css">
    <link rel="stylesheet" href="../CSS/style.css">
</head>

<body>

    
<header class="topo">
 
    <a href="../menu.html" class="menu-link">
        <img src="../img/icons8-cardápio-50.png" alt="Menu">
    </a>
 
    <h1 class="titulo-topo">Roster</h1>
 
    <nav class="acoes-topo" aria-label="Ações do topo">
 
        <a href="../perfil.html" class="icone-topo">
            <img src="../img/icons8-usuário-homem-com-círculo-24.png" alt="Perfil">
        </a>
 
        <a href="#" class="icone-topo" aria-label="Notificações">
            <svg class="header-icons__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" role="img" aria-hidden="true"><path fill="currentColor" d="M12 22a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2zm6-6V11c0-3.07-1.64-5.64-4.5-6.32V4a1.5 1.5 0 1 0-3 0v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        </a>
 
    </nav>
 
</header>
 
<main class="conteudo" style="padding-top:90px;">
 
    <h2 class="titulo-pagina">Solicitação de Ausência</h2>
 
    <article class="card-jornada">
        <h3 hidden>Jornada designada do dia</h3>

        <header class="card-jornada-topo">
            <span>04/03/2026</span>
            <span>Base: GRU</span>
        </header>

        <ul class="voos-lista">
            <li class="voo-item">
                <span class="voo-indicador"></span>
                <div class="voo-card">
                    <p class="voo-horario">8:45 ▶ 10:30</p>
                    <strong class="voo-rota">GRU → GIG</strong>
                </div>
            </li>

            <li class="voo-item">
                <span class="voo-indicador"></span>
                <div class="voo-card">
                    <p class="voo-horario">8:45 ▶ 10:30</p>
                    <strong class="voo-rota">GRU → SSA</strong>
                </div>
            </li>
        </ul>

    </article>

    <p class="jornada">Jornada designada</p>
 
    <form action="confirmar_lm.html" method="get" class="formulario">
 
        <label class="label-form">Motivo</label>
 
        <select name="motivo" class="campo-select">
            <option selected disabled>Selecione...</option>
            <option>Emergência Familiar</option>
            <option>Doença (Licença Médica)</option>
            <option>Problemas Pessoais</option>
            <option>Consulta Médica</option>
            <option>Outros</option>
        </select>
 
        <fieldset class="textarea-wrapper">
            <textarea
                name="observacao"
                class="campo-textarea"
                placeholder="Informe os detalhes..."
            ></textarea>
            <span class="textarea-mais">⊕</span>
        </fieldset>
 
        <button type="submit" class="botao-enviar">
            ENVIAR
        </button>
 
    </form>
 
    </main>

    <footer>
        <p>Copyright © 2026 Roster. Todos os direitos reservados.</p>
    </footer>

    <script>
        // Ajusta padding-top de acordo com a altura do header para evitar sobreposição
        function adjustContentPadding() {
            const topo = document.querySelector('header.topo');
            const conteudo = document.querySelector('main.conteudo');
            if (!topo || !conteudo) return;
            const h = topo.getBoundingClientRect().height;
            conteudo.style.paddingTop = (h + 12) + 'px'; // 12px de folga
        }
        window.addEventListener('load', adjustContentPadding);
        window.addEventListener('resize', adjustContentPadding);
    </script>

</body>
</html>
